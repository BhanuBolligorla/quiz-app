<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 400px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .email {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .create {
            background: #22c55e;
            color: white;
        }

        .create:hover {
            background: #16a34a;
        }

        .join {
            background: #3b82f6;
            color: white;
        }

        .join:hover {
            background: #2563eb;
        }

        .logout {
            background: #ef4444;
            color: white;
        }

        .logout:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome {{ user.username }}</h1>
    <div class="email">{{ user.email }}</div>

    <a href="/create_quiz" class="btn create">Create Quiz</a>
    <a href="/join_quiz" class="btn join">Join Quiz</a>
    <a href="/logout" class="btn logout">Logout</a>
</div>

</body>
</html>
