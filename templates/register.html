<!DOCTYPE html>
<html>
<head>
    <title>Quiz Battle Register</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #141e30, #243b55);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 380px;
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(18px);
            border-radius: 18px;
            padding: 35px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            color: white;
            text-align: center;
        }

        h2 {
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .link {
            margin-top: 15px;
            font-size: 13px;
        }

        .link a {
            color: #00c6ff;
            font-weight: bold;
            text-decoration: none;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .msg {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
        }

        .error {
            background: #ff4d4d;
        }

        .success {
            background: #2ecc71;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>📝 Register</h2>
    <div class="subtitle">Join the Quiz Battle Arena</div>

    {% if error %}
        <div class="msg error">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="msg success">{{ success }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Create Account</button>
    </form>

    <div class="link">
        Already have an account? <a href="/login">Login</a>
    </div>
</div>

</body>
</html>
