<!DOCTYPE html>
<html>
<head>
    <title>Quiz Battle Login</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #6a11cb, #2575fc);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 360px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(15px);
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            color: white;
            text-align: center;
        }

        h2 { margin-bottom: 10px; }

        .subtitle {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #ff6a00, #ee0979);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .link {
            margin-top: 15px;
            font-size: 13px;
        }

        .link a {
            color: #fff;
            font-weight: bold;
            text-decoration: underline;
        }

        /* TOAST (FIXED) */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ff4d4d;
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            display: none;
            font-size: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>

<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div class="card">
    <h2>🔥 Quiz Battle</h2>
    <div class="subtitle">Compete. Learn. Win.</div>

    <form method="POST">
        <input type="email" name="email" placeholder="Email ID" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="link">
        New here? <a href="/register">Create Account</a>
    </div>
</div>

<script>
    // Flask passes error message here
    let errorMessage = "{{ error|default('') }}";

    window.onload = function () {
        if (errorMessage && errorMessage !== "None") {
            let toast = document.getElementById("toast");
            toast.innerText = errorMessage;
            toast.style.display = "block";

            setTimeout(() => {
                toast.style.display = "none";
            }, 3000);
        }
    }
</script>

</body>
</html>
